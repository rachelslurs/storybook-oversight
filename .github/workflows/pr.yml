name: PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  changeset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 20.19
        uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Fails until the PR adds a changeset describing the version bump per
      # package. For a change that needs no release (docs, CI, chores), run
      # `pnpm changeset add --empty`. Replaces the old SemVer-label check.
      - name: Require a changeset
        run: pnpm exec changeset status --since=origin/${{ github.base_ref }}
