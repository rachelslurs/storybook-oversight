name: Deploy demo to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci') && !contains(github.event.head_commit.message, 'ci skip')"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 20.19
        uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Storybook loads the addon from ./dist, so build it before build-storybook.
      - name: Build addon
        run: pnpm build

      # Emits storybook-static/ including manifests/components.json (the manifest
      # Oversight lints), so the hosted demo shows real diagnostics.
      - name: Build Storybook
        run: pnpm build-storybook

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
